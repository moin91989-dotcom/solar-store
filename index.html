<!DOCTYPE html>
<html>
<head>
<title>Solar Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f5f6f8; }

.nav {
  background:#0a7f3f;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.search input {
  padding:8px;
  width:200px;
}

.container {
  padding:20px;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  text-align:center;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

button {
  background:#25D366;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
  border-radius:5px;
}

.cart {
  position:fixed;
  right:10px;
  top:80px;
  background:white;
  padding:15px;
  width:250px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="nav">
  <h2>☀️ Solar Store</h2>
  <div class="search">
    <input placeholder="Search products...">
  </div>
</div>

<div class="container">
  <div class="products" id="products">Loading products...</div>
</div>

<div class="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<h4 id="total"></h4>
<button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

// =======================
// LOAD PRODUCTS
// =======================
fetch("https://solar-store-production.up.railway.app/products")
.then(res => res.json())
.then(data => {
  let container = document.getElementById("products");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<p>No products found</p>";
    return;
  }

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image || 'https://via.placeholder.com/200'}">
        <h3>${p.name}</h3>
        <p>Rs. ${p.price}</p>
        <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price})">
          Add to Cart
        </button>
      </div>
    `;
  });
})
.catch(err => {
  document.getElementById("products").innerHTML = "Failed to load products";
});

// =======================
// CART
// =======================
function addToCart(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  let list = document.getElementById("cartItems");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(i => {
    total += i.price;
    list.innerHTML += `<li>${i.name} - Rs.${i.price}</li>`;
  });

  document.getElementById("total").innerText = "Total: Rs." + total;
}

// =======================
// CHECKOUT
// =======================
function checkout(){
  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  let name = prompt("Name");
  let phone = prompt("Phone");

  fetch("https://solar-store-production.up.railway.app/order", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ name, phone, cart })
  })
  .then(r => r.json())
  .then(d => {
    alert("Order placed!");
    cart = [];
    renderCart();
  });
}

// =======================
// SEARCH
// =======================
window.addEventListener("DOMContentLoaded", () => {
  document.querySelector(".search input").addEventListener("input", function(e){
    let value = e.target.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
      let text = card.innerText.toLowerCase();
      card.style.display = text.includes(value) ? "block" : "none";
    });
  });
});
</script>

</body>
</html>
